model:
  base_model: Qwen/Qwen3-4B-Instruct-2507
  max_seq_len: 1024
  gradient_checkpointing: true

qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  output_dir: runs/karl-twin
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_steps: 2000
  logging_steps: 20
  save_steps: 200
  eval_steps: 200
  bf16: true
  optim: paged_adamw_8bit
  weight_decay: 0.0
  seed: 42

data:
  train_mix:
    real_conv: 0.55
    high_reward: 0.35
    synthetic_structure: 0.10
  train_files:
    real_conv: /workspace/data/real_conv_train.jsonl
    high_reward: /workspace/data/high_reward_train.jsonl
    synthetic_structure: /workspace/data/synth_struct.jsonl
  eval_file: /workspace/data/real_conv_eval.jsonl

anticipation:
  use_inscription: true
  use_gate: true
  use_lse_loop: true
  trajectory_dims: 7
  commitment_threshold: 0.8
